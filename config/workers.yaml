load_balancer:
  timeout: 60
  max_retries: 5
  token_based_routing: true
  streaming_enabled: true

circuit_breaker:
  failure_threshold: 5
  recovery_timeout: 30

healthcheck:
  interval: 5
  timeout: 2

queue:
  enabled: true
  max_size: 100
  ttl: 300
  max_retries: 5
  retry_backoff_base: 2
  retry_backoff_max: 60

rate_limiting:
  enabled: true
  requests_per_minute: 60

dead_letter:
  enabled: true
  max_size: 1000

metrics:
  enabled: true
