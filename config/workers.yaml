# Configuration Production-Ready pour LLM Load Balancer
# =====================================================

workers:
  # Worker M1 - Instance locale (simulation)
  - id: M1
    url: http://localhost:8001
    weight: 1
    backend: simulated
    model_name: null
    max_concurrent: 10

  # Worker M2 - Instance locale (simulation)
  - id: M2
    url: http://localhost:8002
    weight: 1
    backend: simulated
    model_name: null
    max_concurrent: 10

  # Worker M3 - Instance locale (simulation)
  - id: M3
    url: http://localhost:8003
    weight: 1
    backend: simulated
    model_name: null
    max_concurrent: 10

